<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Incoming Call</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="call-box">
        <p class="incoming">Incoming Call</p>
        <h2 id="callerName">Mom</h2>
        <p>Mobile</p>

        <div class="call-buttons">
            <button class="accept" onclick="acceptCall()">Accept</button>
            <button class="reject" onclick="rejectCall()">Reject</button>
        </div>
    </div>
</div>

<audio id="ringtone" loop>
    <source src="https://www.soundjay.com/phone/phone-ring-01.mp3" type="audio/mpeg">
</audio>

<script src="javascript.js"></script>
</body>
</html>
